<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion Bodega</title>
    <link rel="icon" type="image/png" href="/img/clank.png" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body>
    <header class="header">
      <div class="header-content">
        <h1 class="header-title">Gestion de bodega - INVENTORY</h1>
        <nav class="main-nav">
          <button class="nav-btn" onclick="router('registrar')">
            Nuevo Producto
          </button>
          <button class="nav-btn nav-btn-carrito" onclick="toggleCarrito()">
            🛒 Carrito
            <span id="carrito-badge">0</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="main-container">
      <div class="content-grid">
        <!-- Panel lateral -->
        <aside class="sidebar">
          <section class="search-section card">
            <h3>Buscar Producto</h3>
            <div class="search-input">
              <input
                type="text"
                id="buscar-producto"
                placeholder="Escribe el nombre del producto"
                class="search-field"
              />
            </div>
          </section>

          <section class="form-section card">
            <h3>Registrar Nuevo Producto</h3>
            <form id="form-producto" class="product-form">
              <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input
                  type="text"
                  id="nombre"
                  placeholder="Ej. Arroz Costeño"
                  required
                />
              </div>

              <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea
                  id="descripcion"
                  placeholder="Descripción del producto"
                  rows="3"
                  required
                ></textarea>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="precio">Precio (S/)</label>
                  <input
                    type="number"
                    id="precio"
                    step="0.01"
                    placeholder="0.00"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="stock">Stock Inicial</label>
                  <input
                    type="number"
                    id="stock"
                    placeholder="Cantidad"
                    required
                  />
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-full">
                Guardar Producto
              </button>
            </form>
          </section>
        </aside>

        <!-- Contenido principal -->
        <section class="main-content">
          <div class="products-section card">
            <div class="section-header">
              <h2>Productos en Almacén</h2>
              <div class="section-actions">
                <span class="product-count" id="product-count"
                  >0 productos</span
                >
              </div>
            </div>

            <div class="table-container">
              <table id="tabla-productos" class="products-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th class="text-center">Acciones</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- Overlay del carrito -->
    <div
      id="carrito-overlay"
      class="carrito-overlay"
      onclick="toggleCarrito()"
    ></div>

    <!-- Panel lateral del carrito -->
    <aside id="carrito-panel" class="carrito-panel">
      <div class="carrito-header">
        <span class="carrito-titulo">🛒 Carrito de Ventas</span>
        <button class="btn-cerrar-carrito" onclick="toggleCarrito()">✕</button>
      </div>

      <div id="carrito-items" class="carrito-items">
        <!-- Items renderizados por CarritoUI -->
      </div>

      <div class="carrito-footer">
        <div class="carrito-resumen">
          <span class="carrito-resumen-label">Total:</span>
          <span id="carrito-total" class="carrito-total-valor">S/ 0.00</span>
        </div>
        <div class="carrito-acciones">
          <button id="btn-vaciar-carrito" class="btn btn-danger">Vaciar</button>
          <button id="btn-confirmar-venta" class="btn btn-primary">
            Confirmar Venta
          </button>
        </div>
      </div>
    </aside>

    <footer class="footer">
      <div class="footer-content">
        <p>
          &copy; 2026 Gestión de Inventario Benjamin - Bodega. Todos los
          derechos reservados.
        </p>
      </div>
    </footer>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
