<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="icon" type="image/png" href="/img/clank.png" />
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/componentes.css">
    <link rel="stylesheet" href="./css/tablas.css">
</head>

<body>
    <header>
        <h1>Gestión de Inventario - Bodega</h1>
        <!-- <nav class="main-nav">
            <button onclick="router('inventario')">Inventario</button>
            <button onclick="router('registrar')">Nuevo Producto</button>
            <button onclick="router('carrito')">Carrito de Ventas</button>
        </nav> -->
    </header>

    <main class="container">
        <section class="card">
            <h2>Registrar Nuevo Producto</h2>
            <form id="form-producto">
                <div class="input-group">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" placeholder="Ej. Arroz Costeño" required>
                </div>

                <div class="input-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Descripción del producto" required></textarea>
                </div>
                <div class="input-group">
                    <label for="precio">Precio (S/)</label>
                    <input type="number" id="precio" step="0.1" placeholder="0.00" required>
                </div>
                <div class="input-group">
                    <label for="stock">Stock Inicial</label>
                    <input type="number" id="stock" placeholder="Cantidad" required>
                </div>
                <button type="submit" class="btn-save">Guardar en Base de Datos</button>
            </form>
        </section>

        <section class="card">
            <h2>Productos en Almacén</h2>
            <div class="table-container">
                <table id="tabla-productos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>


    </main>

    <script type="module" src="/js/main.js"></script>





</body>

</html>
